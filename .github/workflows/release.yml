name: Release libs

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    name: Release libs
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          [
            ubuntu-latest,
            ubuntu-24.04-arm,
            windows-latest,
            macos-13,
            macos-latest,
          ]

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Setup Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config
          if [[ "${{ matrix.setup }}" == "linux-jack" ]]; then
            sudo apt-get install -y libjack-jackd2-dev
          fi

      - name: Build
        run: cargo build --release --manifest-path src-rust/Cargo.toml

      - name: Correct MacOS lib name
        if: runner.os == 'MacOS'
        run: |
          mv src-rust/target/release/libdeno_webmidi_ffi.dylib libdeno_webmidi_ffi_$(uname -m).dylib

      - name: Upload MacOS lib
        if: runner.os == 'MacOS'
        uses: svenstaro/upload-release-action@v2
        with:
          file: libdeno_webmidi_ffi_*.dylib
          tag: ${{ github.ref }}
          overwrite: true
          file_glob: true

      - name: Correct linux lib name
        if: runner.os == 'Linux'
        run: |
          mv src-rust/target/release/libdeno_webmidi_ffi.so libdeno_webmidi_ffi_$(uname -m).so

      - name: Upload Linux lib
        if: runner.os == 'Linux'
        uses: svenstaro/upload-release-action@v2
        with:
          file: libdeno_webmidi_ffi_*.so
          tag: ${{ github.ref }}
          overwrite: true
          file_glob: true

      - name: Upload Windows lib
        if: runner.os == 'Windows'
        uses: svenstaro/upload-release-action@v2
        with:
          file: src-rust/target/release/deno_webmidi_ffi.dll
          tag: ${{ github.ref }}
          overwrite: true
